<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS练习</title>
    <link rel="stylesheet" href="styles\main.css"> 
    <style>
      /* 修改此处，添加字体和加粗样式 */
      body {
        font-family: "KaiTi", "SimSun", serif;
        font-weight: bold;
      }
      h2 {
        text-decoration: underline;
        color: cadetblue;
      }
    </style>
  </head>
  <body>
    <h1>CSS练习</h1>
    <div>
      <h2>使用样式表的三种方式</h2>
      <ul>
        <li style="color: aquamarine;">外部样式表</li>
        <li style="color: cadetblue;">内部样式表</li>
        <li style="color: aqua;">内嵌样式表</li>
      </ul>
    </div>
  </body>
</html>
