<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西北民族大学</title>
</head>

<body>
    <!-- 标题 -->
    <h1>西北民族大学简介</h1>
    <!-- 段落 -->
    <p>西北民族大学位于甘肃省兰州市，是直属国家民族事务委员会的中央部属高校，也是国家民委与教育部、国家民委与甘肃省人民政府共建高校。</p>

    <!-- 列表 -->
    <h2>西北民族大学的优势学科</h2>
    <ol>
        <li>民族学</li>
        <li>中国语言文学</li>
        <li>计算机科学与技术</li>
    </ol>

    <h2>学校的学院设置</h2>
    <ul>
        <li>文学院</li>
        <li>法学院</li>
        <li>经济学院</li>
    </ul>

    <!-- 逻辑区块 -->
    <div>
        <p>学校有着丰富的校园文化生活，各种社团活动精彩纷呈。</p>
    </div>

    <!-- 文本语义元素 -->
    <p>你可以通过访问 <a href="https://www.xbmu.edu.cn/">西北民族大学官网</a> 了解更多信息。</p>

    <!-- 嵌入内容元素 -->
    <img src="https://p1.ssl.qhimgs1.com/sdr/400__/t046c97d5b130e858e7.jpg" alt="西北民族大学校园风景">
    <iframe width="560" height="315" src="https://www.bilibili.com/video/BV1H54y1R7DM?t=8.5" frameborder="0"
        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>

    <!-- 表格 -->
    <table>
        <thead>
            <tr>
                <th>学院名称</th>
                <th>专业数量</th>
                <th>学生人数</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>文学院</td>
                <td>5</td>
                <td>800</td>
            </tr>
            <tr>
                <td>法学院</td>
                <td>3</td>
                <td>600</td>
            </tr>
        </tbody>
    </table>

    <!-- 表单 -->
    <form action="#">
        <label for="name">姓名:</label>
        <input type="text" id="name" name="name" required><br>
        <label for="email">邮箱:</label>
        <input type="email" id="email" name="email" required><br>
        <label for="interest">感兴趣的学院:</label>
        <select id="interest" name="interest">
            <option value="文学院">文学院</option>
            <option value="法学院">法学院</option>
            <option value="经济学院">经济学院</option>
        </select><br>
        <button type="submit">提交</button>
    </form>
</body>

</html>
